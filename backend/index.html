<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Expense Tracker</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="root">
        <h1 class="page-title">💸 Expense Tracker</h1>

        <!-- Summary -->
        <div class="glass-panel summary-panel">
            <div class="text-left">
                <div class="stat-label">Total Monthly Spending</div>
                <div id="total-spending" class="stat-value">₹ 0.00</div>
            </div>
            <div class="text-right">
                <div class="stat-label">Highest Spending</div>
                <div id="highest-spending" class="spending-badge">
                    None
                </div>
            </div>
        </div>

        <div class="glass-panel dashboard-panel">
            <div class="dashboard-header">
                <h2>Dashboard</h2>
                <div class="btn-group">
                    <button id="show-analysis-btn" class="btn-primary" style="padding: 8px 16px; font-size: 14.4px; box-shadow: none;">
                        📊 Show Analysis
                    </button>
                    <button id="clear-btn" class="btn-clear">
                        Clear All
                    </button>
                </div>
            </div>



            <!-- Category Grid (Dynamic) -->
            <h3 class="section-header" style="margin-top: 0; margin-bottom: 16px;">Categories (Click to add expense)</h3>
            <div id="category-grid" class="grid-container">
            </div>

            <!-- Expenses List -->
            <h3 class="section-header">Recent Expenses (Grouped)</h3>
            <div id="expenses-container" class="expenses-list-container">
            </div>
        </div>
    </div>

    <!-- Quick Expense Modal -->
    <div id="quick-expense-modal" class="modal-overlay" style="display: none;">
        <div class="glass-panel modal-content">
            <h2 id="modal-category-name" style="margin-bottom: 24px;">Add Expense to ...</h2>
            <input id="modal-amount" type="number" placeholder="₹ Amount" class="input-field">
            <input id="modal-date" type="date" class="input-field">
            <div style="display: flex; gap: 12px; margin-top: 16px;">
                <button id="modal-cancel-btn" class="btn-clear" style="flex: 1;">Cancel</button>
                <button id="modal-save-btn" class="btn-primary" style="flex: 1;">Save</button>
            </div>
        </div>
    </div>

    <!-- Add Category Modal -->
    <div id="add-category-modal" class="modal-overlay" style="display: none;">
        <div class="glass-panel modal-content">
            <h2 style="margin-bottom: 24px;">Add New Category</h2>
            <input id="modal-new-category-name" type="text" placeholder="e.g. Travel" class="input-field">
            <div style="display: flex; gap: 12px; margin-top: 16px;">
                <button id="add-category-cancel-btn" class="btn-clear" style="flex: 1;">Cancel</button>
                <button id="add-category-save-btn" class="btn-primary" style="flex: 1;">Save</button>
            </div>
        </div>
    </div>

    <!-- Analysis Modal -->
    <div id="analysis-modal" class="modal-overlay" style="display: none;">
        <div class="glass-panel modal-content" style="max-width: 800px; width: 95%; max-height: 90vh; overflow-y: auto;">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px;">
                <h2 style="margin: 0;">Spending Analysis</h2>
                <button id="close-analysis-btn" class="btn-clear" style="border: none; padding: 4px 12px; font-size: 20px;">✕</button>
            </div>
            <div class="charts-container">
                <div class="chart-wrapper">
                    <canvas id="barChart"></canvas>
                </div>
                <div class="chart-wrapper">
                    <canvas id="pieChart"></canvas>
                </div>
            </div>
        </div>
    </div>

    <!-- Chart.js CDN -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <!-- Link to the Vanilla JavaScript logic -->
    <script src="Script.js"></script>
</body>
</html>
